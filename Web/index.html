<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red Educativa Inteligente</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="img/Logo R.E.I.jpg" />
  </head>
  <body>
    <!-- Encabezado -->
    <header>
      <div class="logo">
        <img src="img/Logo R.E.I.jpg" alt="Logo REI" />
        <h1>Red Educativa Inteligente</h1>
      </div>
      <h2>Aprender, crear y compartir conocimiento</h2>
    </header>

    <!-- Buscador -->
    <section class="buscador">
      <input type="text" placeholder="Buscar..." />
      <button>Buscar</button>
    </section>

    <!-- Tarjetas de categorías -->
    <section class="categorias">
      <div class="card">Matemáticas</div>
      <div class="card">Programación</div>
      <div class="card">Robótica</div>
      <div class="card">Ciencias</div>
      <div class="card">Docentes</div>
    </section>

    <!-- Pie de página -->
    <footer>
      <p>
        &copy; 2026 Red Educativa Inteligente - Todos los derechos reservados
      </p>
    </footer>
  </body>
</html>
